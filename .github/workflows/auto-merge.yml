name: Auto-merge Claude PRs

on:
  workflow_run:
    workflows: ["Lint backup scripts"]
    types: [completed]

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge the open PR sitting on this commit, if any
        env:
          # Use a PAT, not github.token: merges performed with the default
          # GITHUB_TOKEN don't trigger the "Fixes #N" auto-close-on-merge
          # linkage, so the tracking issue is left open even though the fix
          # landed.
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          pr=$(gh pr list --repo "$REPO" --state open --json number,headRefOid --jq ".[] | select(.headRefOid == \"$SHA\") | .number")
          if [ -n "$pr" ]; then
            gh pr merge "$pr" --repo "$REPO" --squash --delete-branch
          fi
