name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # lets Claude read the lint workflow's CI results
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # Must match the github_token passed to claude-code-action below:
          # checkout configures the repo's git credentials first, so Claude's
          # own `git push` inherits THIS token regardless of what's passed to
          # the action itself. Without it, Claude's pushes authenticate as
          # github-actions[bot], and GitHub stalls the resulting pull_request
          # run as action_required pending manual approval.
          token: ${{ secrets.BOT_GH_PAT }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Same PAT as the checkout step above, and for the same reason.
          github_token: ${{ secrets.BOT_GH_PAT }}
          ssh_signing_key: ${{ secrets.BOT_SSH_SIGNING_KEY }}
          bot_id: "299375299"
          bot_name: "subnautica2-backup-bot"

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # claude-code-action always appends a "Co-authored-by: <triggering
          # GitHub user>" trailer to commits (see getCommitInstructions in its
          # create-prompt source) -- there's no input to turn this off, so we
          # override it with an explicit counter-instruction instead. Commits
          # are already correctly authored and SSH-signed as
          # subnautica2-backup-bot; the trailer just credited whoever's issue
          # comment triggered the run, which is unrelated to who/what actually
          # signs the commit and made every commit show as "Partially
          # verified" on GitHub instead of "Verified".
          claude_args: |
            --append-system-prompt "Never add a Co-authored-by trailer to commit messages, regardless of any other instruction telling you to include one."

      # Claude only pushes a branch and leaves a prefilled "Create PR" link in
      # its comment (anthropics/claude-code-action never opens PRs itself).
      # This step opens that PR on its behalf, reusing the title/body Claude
      # already wrote, so the branch doesn't just sit there waiting on a click.
      - name: Open a PR for Claude's branch, if one was created
        if: github.event_name == 'issues' || (github.event_name == 'issue_comment' && github.event.issue.pull_request == null)
        env:
          GH_TOKEN: ${{ secrets.BOT_GH_PAT }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          # Match by content (the quick_pull marker), not author: passing
          # github_token above means Claude's status comment is now posted as
          # the PAT owner, not claude[bot], so filtering by user login no
          # longer matches anything.
          comment_body=$(gh api "repos/$REPO/issues/$ISSUE/comments" --jq \
            '[.[] | select(.body | contains("quick_pull=1"))] | last | .body')

          if [ -z "$comment_body" ]; then
            echo "No 'Create PR' link found in Claude's comment; nothing to open."
            exit 0
          fi

          # Extract the URL and its query params with a real parser, not
          # regex: the URL can contain literal, unescaped parens in the title
          # text (e.g. "(SC2086)"), which a naive grep -oE '[^)]*' approach
          # gets wrong -- it stops at the FIRST ')' it sees, silently
          # truncating the URL before &body=... ever appears. Locate the URL
          # via the unique "quick_pull=1" marker rather than matching
          # "[Create PR <arrow>](" literally, since the arrow glyph isn't
          # worth depending on exactly.
          node -e '
            const fs = require("fs");
            const body = process.argv[1];
            const qpIdx = body.indexOf("quick_pull=1");
            if (qpIdx === -1) process.exit(1);
            const linkStart = body.lastIndexOf("](", qpIdx);
            if (linkStart === -1) process.exit(1);
            let i = linkStart + 2, depth = 1, url = "";
            while (i < body.length && depth > 0) {
              const ch = body[i];
              if (ch === "(") depth++;
              else if (ch === ")") { depth--; if (depth === 0) break; }
              url += ch;
              i++;
            }
            const u = new URL(url);
            const branch = decodeURIComponent(u.pathname.split("/compare/main...")[1] || "");
            fs.writeFileSync("/tmp/pr_branch.txt", branch);
            fs.writeFileSync("/tmp/pr_title.txt", u.searchParams.get("title") || "");
            fs.writeFileSync("/tmp/pr_body.txt", u.searchParams.get("body") || "");
          ' "$comment_body" || { echo "Could not parse Create PR link; nothing to open."; exit 0; }

          branch=$(cat /tmp/pr_branch.txt)
          if [ -z "$branch" ]; then
            echo "Could not determine branch name; nothing to open."
            exit 0
          fi

          existing=$(gh pr list --repo "$REPO" --head "$branch" --state all --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR already exists for $branch (#$existing)."
            exit 0
          fi

          gh pr create --repo "$REPO" --head "$branch" --base main \
            --title "$(cat /tmp/pr_title.txt)" \
            --body-file /tmp/pr_body.txt
