name: Lint backup scripts

on:
  push:
    paths:
      - 'backup-mac.sh'
      - 'backup-windows.ps1'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on backup-mac.sh
        uses: ludeeus/action-shellcheck@master
        with:
          files: backup-mac.sh

  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer on backup-windows.ps1
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path backup-windows.ps1 -Severity Warning,Error -EnableExit