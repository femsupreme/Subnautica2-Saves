name: Lint backup scripts

on:
  push:
    paths:
      - 'backup-mac.sh'
      - 'backup-windows.ps1'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck on backup-mac.sh
        uses: ludeeus/action-shellcheck@master

  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run PSScriptAnalyzer on backup-windows.ps1
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path backup-windows.ps1 -Severity Warning,Error -ExcludeRule PSAvoidUsingWriteHost -EnableExit

  notify-on-failure:
    needs: [shellcheck, psscriptanalyzer]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update a CI-failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create ci-failure --color b60205 --description "Automated: CI failure" --force --repo "$REPO"

          existing=$(gh issue list --repo "$REPO" --label ci-failure --state open --json number --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "Still failing as of ${{ github.sha }}.

          Run: $RUN_URL"
          else
            gh issue create --repo "$REPO" --title "CI is failing" --label ci-failure --body "First failed on ${{ github.sha }}.

          Run: $RUN_URL"
          fi